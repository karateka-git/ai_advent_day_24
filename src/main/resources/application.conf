app {
  inputDir = "./docs"
  outputDir = "./data"
}

ollama {
  baseUrl = "http://localhost:11434"
  embeddingModel = "nomic-embed-text"
}

llm {
  agentId = ""
  userToken = ""
  model = "DeepSeek V3.2"
  temperature = 0.7
  maxTokens = 400
}

chunking {
  fixedSize = 1200
  overlap = 200
}

search {
  topK = 5
  initialTopK = 8
  finalTopK = 3
  minSimilarity = 0.15
  postProcessingMode = "none"

  heuristic {
    minKeywordOverlap = 1
    cosineWeight = 0.7
    keywordOverlapWeight = 0.3
    exactMatchBonus = 0.15
    titleMatchBonus = 0.1
    sectionMatchBonus = 0.05
    duplicatePenalty = 0.2
  }

  modelRerank {
    enabled = true
    maxCandidates = 8
  }
}

